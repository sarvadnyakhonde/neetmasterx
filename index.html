<!DOCTYPE html>
<html>
<head>
    <title>NEETMasterX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f4f8ff;
            padding: 30px;
        }

        .box {
            background: white;
            padding: 25px;
            max-width: 500px;
            margin: auto;
            border-radius: 15px;
        }

        h1 {
            color: #1565c0;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>NEETMasterX</h1>
    <h3>Free NEET MCQ Practice Platform</h3>

    <p>Practice Biology, Physics and Chemistry MCQs with NCERT-based learning.</p>

    <h3>Sample MCQ</h3>

    <p>Which organelle is known as the powerhouse of the cell?</p>

    <button onclick="showAnswer()">Show Answer</button>

    <p id="answer"></p>
</div>

<script>
function showAnswer() {
    document.getElementById("answer").innerHTML =
    "Correct Answer: Mitochondria";
}
</script>

</body>
